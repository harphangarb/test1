kind = "web"
previewPath = "/"
title = "Hangar B Tour"
version = "1.0.0"
id = "artifacts/hangar-tour"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18341

[services.development]
run = "pnpm --filter @workspace/hangar-tour run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hangar-tour", "run", "build" ]
publicDir = "artifacts/hangar-tour/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18341"
BASE_PATH = "/"
